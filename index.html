<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Investment Simulation</title>
    <style>
        /* This section controls the look of your page */
        body {
            background-color: #eef8eb; /* Your requested color */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #2d5a27; /* A darker green to match the background */
        }

        p {
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #2d5a27;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #1e3d1a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the Simulation</h1>
        <p>This page is ready for your investment game code. The background is set to your custom soft green (#eef8eb).</p>
        
        <a href="#" class="btn">Start Game</a>
    </div>

</body>
</html>
