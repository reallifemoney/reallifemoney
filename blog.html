<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Real Life Money</title>
    <link rel="stylesheet" href="style.css"> <style>
        .blog-grid {
            max-width: 1000px;
            margin: 120px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .article-card {
            background: var(--white);
            border: 1px solid var(--rule);
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border-color: var(--purple);
        }
        .article-date { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .article-card h2 { font-size: 22px; color: var(--ink); line-height: 1.3; margin-bottom: 15px; }
        .article-excerpt { font-size: 15px; color: var(--muted); line-height: 1.6; flex-grow: 1; margin-bottom: 20px; }
        .read-more { color: var(--purple); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <header style="text-align: center; padding: 140px 20px 40px;">
        <div class="stag"><span class="stag-dot"></span>Financial Education</div>
        <h1 style="font-size: clamp(32px, 5vw, 48px); letter-spacing: -1.5px;">The Blog</h1>
    </header>

    <div class="blog-grid">
        <a href="/blog/inflation-problem.html" class="article-card">
            <div class="article-date">May 2026</div>
            <h2>Why 2% Inflation is a 100% Problem for Your Savings</h2>
            <p class="article-excerpt">2% sounds tiny, but over a decade, it's a persistent thief. Learn why your "safe" savings might be losing value every day.</p>
            <div class="read-more">Read article →</div>
        </a>
        
        </div>
</body>
</html>
