<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Real Life Money</title>
    <meta name="description" content="Personal finance is confusing. Learn more about investing, pensions and savings from my useful blog, then book onto my investing course to become a master.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css"> <style>
    /* Shared Blog Styles */
:root {
    --mint:    #eef8eb;
    --purple:  #8c52ff;
    --ink:     #1a1a1a;
    --text:    #2e2e2e;
    --muted:   #6b6b6b;
    --rule:    #daecd6;
    --white:   #ffffff;
}

body {
    background: var(--mint);
    color: var(--text);
    font-family: 'Lexend', sans-serif;
    font-weight: 300;
    line-height: 1.7;
}

/* Nav specific to Blog/Articles */
nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 80px;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(238, 248, 235, 0.8); /* var(--mint) with transparency */
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
}

.nav-logo img { height: 70px; width: auto; }

.nav-cta {
    background: var(--purple);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 24px;
    border-radius: 100px;
    text-decoration: none;
    transition: all 0.2s;
}

.nav-cta:hover { transform: translateY(-1px); opacity: 0.9; }

/* Custom "Stag" label style from your main page */
.stag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 24px;
}
.stag-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); }

@media (max-width: 600px) {
    nav { padding: 0 20px; }
}

        .blog-grid {
            max-width: 1000px;
            margin: 120px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .article-card {
            background: var(--white);
            border: 1px solid var(--rule);
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border-color: var(--purple);
        }
        .article-date { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .article-card h2 { font-size: 22px; color: var(--ink); line-height: 1.3; margin-bottom: 15px; }
        .article-excerpt { font-size: 15px; color: var(--muted); line-height: 1.6; flex-grow: 1; margin-bottom: 20px; }
        .read-more { color: var(--purple); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
<nav>
    <a class="nav-logo" href="/">
      <img src="/logo.webp" alt="Real Life Money">
    </a>
    <a class="nav-cta" href="/">← Back to Home</a>
</nav>

<header style="padding: 160px 20px 40px; text-align: center;">
    <div class="stag"><span class="stag-dot"></span>Financial Education</div>
    <h1 style="font-size: clamp(36px, 6vw, 56px); font-weight: 700; letter-spacing: -2px;">My blog</h1>
</header>

<main style="max-width: 1100px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px;">
    <a href="/blog/inflation-eating-your-money.html" style="background: var(--white); border: 1px solid var(--rule); padding: 40px; border-radius: 24px; text-decoration: none; color: inherit; transition: all 0.3s ease;" onmouseover="this.style.borderColor='#8c52ff'; this.style.transform='translateY(-5px)'" onmouseout="this.style.borderColor='#daecd6'; this.style.transform='translateY(0)'">
        <div style="font-size: 12px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase;">May 2026</div>
        <h2 style="font-size: 24px; margin-bottom: 15px; line-height: 1.2;">Why 2% inflation is a 100% problem for your savings</h2>
        <p style="color: var(--muted); font-size: 15px; margin-bottom: 20px;">Think 2% is a small number? Learn how the "slow leak" of inflation eats your wealth over time.</p>
        <span style="color: var(--purple); font-weight: 600; font-size: 14px;">Read more →</span>
    </a>
</main>

   <footer>
        <p>© 2026 Real Life Money. Built with ❤️ in Bristol.</p>
        <div class="footer-nav">
            <a href="/course">Course</a>
            <a href="/blog">Blog</a>
            <a href="/teachers-invest">Schools</a>
            <a href="/contact">Contact</a>
        </div>
    </footer>

</body>
</html>
