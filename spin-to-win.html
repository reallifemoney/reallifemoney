<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Bristol Investing - Daily Spin Wheel</title>
    <link 
  href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" 
  rel="stylesheet" 
  media="print" 
  onload="this.media='all'"
>
    <style>
        :root {
            --light-bg: #F4F9F4;
            --dark-text: #222;
            --mint:    #eef8eb;
            --purple:  #8c52ff;
            --orange:  #ff914d;
            --yellow:  #ffde59;
            --green:   #71c558;
            --ink:     #1a1a1a;
            --text:    #2e2e2e;
            --muted:   #6b6b6b;
            --rule:    #daecd6;
            --white:   #ffffff;
            --darkgreen: #1F3A29;
        }

        body {
            font-family: 'Lexend', Helvetica, Arial, sans-serif;
            background-color: var(--mint);
            color: var(--dark-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container-logo {
            text-align: center;
            background: var(--mint);
        }
        
         .container-wheel {
            text-align: center;
            max-width: 500px;
            width: 100%;
            background: var(--darkgreen);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        h1 {
            color: var(--green);
            font-family: 'Lexend', Arial;
            margin-bottom: 5px;
            font-size: 24px;
            margin-top: 0;
        }
        
        p {
            font-family: 'Lexend', Arial;
            
        }

        p.subtitle {
            color: white;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px auto;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--purple);
            z-index: 10;
        }

        canvas {
            display: block;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        .btn {
            background-color: var(--purple);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(123, 44, 191, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            max-width: 250px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(123, 44, 191, 0.4);
        }

        .btn:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed var(--purple);
            border-radius: 8px;
            background: #F9F5FF;
        }

        .code-display {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--purple);
            margin: 10px 0;
        }

        .lockout-message {
            display: none;
            color: #d90429;
            font-weight: 500;
            margin-top: 15px;
            background: #ffe3e3;
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
  <div class="container-logo">
    <!-- Centered Logo Image Component -->
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="get-Bristol-investing.webp" alt="Get Bristol Investing Logo" style="max-width: 140px; width: 100%; height: auto; display: inline-block;">
    </div>
    </div>


<div class="container-wheel">
    <p class="subtitle">Spin the wheel to unlock an exclusive workshop perk! (1 spin per day)</p>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="320" height="320"></canvas>
    </div>

    <button id="spinBtn" class="btn" onclick="spinWheel()">Spin the Wheel</button>

    <div id="lockoutMsg" class="lockout-message"></div>

    
        <div id="resultBox" class="result-box">
        <h3 id="resultHeader" style="margin: 0; color: #2b9348;">🎉 You won!</h3>
        <p id="resultSubtext" style="margin: 5px 0 10px 0; font-size: 14px;">Use this code at checkout:</p>
        <div id="codeDisplay" class="code-display"></div>
        <small id="resultFooter" style="color: #666; display: block; margin-bottom: 15px;">Take a screenshot of this code. Valid for 24 hours.</small>
        
        <!-- Booking Redirect Button -->
        <a id="bookPlaceBtn" href="reallifemoney.co.uk/investing-course" class="btn" style="display: inline-block; text-decoration: none; background-color: #2b9348; box-shadow: 0 4px 10px rgba(43, 147, 72, 0.3);">Book your place</a>
    </div>

</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultBox = document.getElementById('resultBox');
    const lockoutMsg = document.getElementById('lockoutMsg');

    // 26 Segments structured perfectly matching your breakdown targets
    const segments = [
        { type: 'cash',   label: '£20 off',    value: 20,       color: '#71c558' }, // 1x £20 (Green)
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' }, // Loser (Orange)
        { type: 'snack',  label: 'Free Snack', value: 'SNACK',   color: '#ffde59' }, // 1x Snack (Yellow)
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'cash',   label: '£10 off',    value: 10,       color: '#8c52ff' }, // 1x £10 (Purple)
        { type: 'respin', label: '+1 Spin',    value: 'RESPIN', color: '#eef8eb' }, // 1x Respin (Mint)
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'cash',   label: '£5 off',     value: 5,        color: '#daecd6' }, // 1x £5 (Darker Mint)
        { type: 'snack',  label: 'Free Snack', value: 'SNACK',   color: '#ffde59' }, // 2x Snack
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'respin', label: '+1 Spin',    value: 'RESPIN', color: '#eef8eb' }, // 2x Respin
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'cash',   label: '£10 off',    value: 10,       color: '#8c52ff' }, // 2x £10
        { type: 'snack',  label: 'Free Snack', value: 'SNACK',   color: '#ffde59' }, // 3x Snack
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'cash',   label: '£5 off',     value: 5,        color: '#daecd6' }, // 2x £5
        { type: 'respin', label: '+1 Spin',    value: 'RESPIN', color: '#eef8eb' }, // 3x Respin
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'snack',  label: 'Free Snack', value: 'SNACK',   color: '#ffde59' }, // 4x Snack
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'respin', label: '+1 Spin',    value: 'RESPIN', color: '#eef8eb' }, // 4x Respin
        { type: 'cash',   label: '£5 off',     value: 5,        color: '#daecd6' }, // 3x £5
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' },
        { type: 'snack',  label: 'Free Snack', value: 'SNACK',   color: '#ffde59' }, // 5x Snack
        { type: 'respin', label: '+1 Spin',    value: 'RESPIN', color: '#eef8eb' }, // 5x Respin
        { type: 'retry',  label: 'Try Again',   value: 0,        color: '#ff914d' }  // 10x Total Loser Check
    ];

    const totalSegments = segments.length;
    const arc = (2 * Math.PI) / totalSegments;

       function drawWheel() {
        const radius = canvas.width / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < totalSegments; i++) {
            const angle = i * arc;
            
            // 1. Draw and Fill the Segment Wedge
            ctx.fillStyle = segments[i].color;
            ctx.beginPath();
            ctx.moveTo(radius, radius);
            ctx.arc(radius, radius, radius, angle, angle + arc, false);
            ctx.lineTo(radius, radius);
            ctx.fill();

            // 2. Crisp 1px Black Border Outline
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 3. Render Text Inside Segments safely with high contrast styling
            ctx.save();
            ctx.fillStyle = (segments[i].color === '#8c52ff' || segments[i].color === '#ff914d') ? "#ffffff" : "#1a1a1a";
            
            ctx.font = "bold 11px 'Segoe UI', sans-serif";
            ctx.translate(radius, radius);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            
            ctx.fillText(segments[i].label, radius - 15, 4);
            ctx.restore();
        }
    }

       // 1. Clear, static codes you can easily create inside your Stripe Dashboard
    const STRIPE_CODES = {
        20:       'BRISTOL20',      // £20 off Voucher
        10:       'BRISTOL10',      // £10 off Voucher
        5:        'BRISTOL5',       // £5 off Voucher
        'SNACK':  'FREEFUEL'        // Snack & Drink Voucher code
    };

    function checkDailyLockout() {
        const lastSpinDate = localStorage.getItem('last_spin_date');
        const todayStr = new Date().toDateString();

        if (lastSpinDate === todayStr) {
            spinBtn.disabled = true;
            spinBtn.style.display = 'none';
            
            const now = new Date();
            const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const hoursLeft = Math.ceil((midnight - now) / (1000 * 60 * 60));
            
            lockoutMsg.style.display = 'block';
            lockoutMsg.innerHTML = `⚠️ You've already used your daily spin! Come back in <strong>${hoursLeft} hours</strong> for your next attempt.`;
            return true;
        }
        return false;
    }

    function spinWheel() {
        if (checkDailyLockout()) return;

        spinBtn.disabled = true;
        resultBox.style.display = 'none';

        const targetedSegmentIndex = Math.floor(Math.random() * totalSegments);
        const degreesPerSegment = 360 / totalSegments;
        const targetAngleDegrees = (targetedSegmentIndex * degreesPerSegment) + (degreesPerSegment / 2);
        const physicalCorrection = 270 - targetAngleDegrees; 
        const finalRotationDegrees = (360 * 5) + physicalCorrection;
        
        canvas.style.transform = `rotate(${finalRotationDegrees}deg)`;

        setTimeout(() => {
            const prize = segments[targetedSegmentIndex];
            
            const header = document.getElementById('resultHeader');
            const subtext = document.getElementById('resultSubtext');
            const codeBox = document.getElementById('codeDisplay');
            const footer = document.getElementById('resultFooter');

            if (prize.type === 'retry') {
                localStorage.setItem('last_spin_date', new Date().toDateString());
                
                header.innerText = "😔 Unlucky this time!";
                header.style.color = "#d90429";
                subtext.innerText = "Sorry, no discounts today.";
                codeBox.innerText = "TRY AGAIN TOMORROW";
                footer.innerText = "Secure your standard seat online before they sell out completely.";
                resultBox.style.display = 'block';
                spinBtn.innerText = "Spun Today";

            } else if (prize.type === 'respin') {
                header.innerText = "🔄 One More Spin!";
                header.style.color = "var(--purple)";
                subtext.innerText = "Luck is on your side! You've unlocked a bonus turn right now.";
                codeBox.innerText = "1 EXTRA SPIN";
                footer.innerText = "Click the button below to spin the wheel again immediately.";
                resultBox.style.display = 'block';
                
                spinBtn.disabled = false;
                spinBtn.innerText = "Spin Again!";

            } else {
                localStorage.setItem('last_spin_date', new Date().toDateString());
                header.style.color = "#2b9348";

                // 2. Look up the static key directly matching Stripe setup metrics
                const finalStripeCode = STRIPE_CODES[prize.value];

                if (prize.type === 'snack') {
                    header.innerText = "🎉 You won a Free Snack & Drink!";
                    subtext.innerText = "Book with the below code and I'll reach out to you to see what you'd like:";
                    codeBox.innerText = finalStripeCode;
                } else {
                    header.innerText = `🎉 You won a ${prize.label} discount!`;
                    subtext.innerText = "Apply this voucher code at checkout:";
                    codeBox.innerText = finalStripeCode;
                }

                footer.innerText = "Take a screenshot of this code. Valid for 24 hours.";
                resultBox.style.display = 'block';
                spinBtn.innerText = "Spun Today";
            }
        }, 4000);
    }


    drawWheel();
    checkDailyLockout();
</script>

</body>
</html>
