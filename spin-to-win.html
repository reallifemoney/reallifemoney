<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Bristol Investing - Daily Spin Wheel</title>
    <style>
        :root {
            --light-bg: #F4F9F4;
            --dark-text: #222;
            --mint:    #eef8eb;
            --purple:  #8c52ff;
            --orange:  #ff914d;
            --yellow:  #ffde59;
            --green:   #71c558;
            --ink:     #1a1a1a;
            --text:    #2e2e2e;
            --muted:   #6b6b6b;
            --rule:    #daecd6;
            --white:   #ffffff;
            --darkgreen: #1F3A29;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--darkgreen);
            color: var(--dark-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            background: #ffffff; /* Changed to white container so text and layout pop beautifully against dark green body */
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        h1 {
            color: var(--purple);
            margin-bottom: 5px;
            font-size: 24px;
            margin-top: 0;
        }

        p.subtitle {
            color: #555;
            margin-bottom: 25px;
            font-size: 15px;
        }

        /* The Wheel Layout */
        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px auto;
        }

        /* The Ticker/Pointer arrow at the top */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--purple);
            z-index: 10;
        }

        canvas {
            display: block;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        /* Controls & Results */
        .btn {
            background-color: var(--purple);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(123, 44, 191, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            max-width: 250px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(123, 44, 191, 0.4);
        }

        .btn:disabled {
            background-color: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 2px dashed var(--purple);
            border-radius: 8px;
            background: #F9F5FF;
        }

        .code-display {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--purple);
            margin: 10px 0;
        }

        .lockout-message {
            display: none;
            color: #d90429;
            font-weight: 500;
            margin-top: 15px;
            background: #ffe3e3;
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Get Bristol Investing</h1>
    <p class="subtitle">Spin the wheel to unlock an exclusive workshop discount voucher! (1 spin per day)</p>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="320" height="320"></canvas>
    </div>

    <button id="spinBtn" class="btn" onclick="spinWheel()">Spin the Wheel</button>

    <div id="lockoutMsg" class="lockout-message"></div>

    <div id="resultBox" class="result-box">
        <h3 style="margin: 0; color: #2b9348;">🎉 You won a <span id="rewardAmount"></span> discount!</h3>
        <p style="margin: 5px 0 10px 0; font-size: 14px;">Use this code at checkout to secure your workshop seat:</p>
        <div id="codeDisplay" class="code-display"></div>
        <small style="color: #666;">Take a screenshot of this code. Valid for 24 hours.</small>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultBox = document.getElementById('resultBox');
    const lockoutMsg = document.getElementById('lockoutMsg');

    // Mapped precisely matching requested slices and color foundations
    const segments = [
        { label: '£5 off', value: 5, color: '#eef8eb' }, // var(--mint)
        { label: '£10 off', value: 10, color: '#8c52ff' }, // var(--purple)
        { label: '£5 off', value: 5, color: '#eef8eb' },
        { label: '£20 off', value: 20, color: '#ffde59' }, // var(--yellow)
        { label: '£10 off', value: 10, color: '#8c52ff' },
        { label: '£5 off', value: 5, color: '#eef8eb' },
        { label: '£30 off', value: 30, color: '#71c558' }, // var(--green)
        { label: '£20 off', value: 20, color: '#ffde59' },
        { label: '£5 off', value: 5, color: '#eef8eb' },
        { label: '£10 off', value: 10, color: '#8c52ff' },
        { label: '£5 off', value: 5, color: '#eef8eb' },
        { label: '£10 off', value: 10, color: '#8c52ff' }
    ];

    const totalSegments = segments.length;
    const arc = (2 * Math.PI) / totalSegments;
    let currentRotationDegrees = 0;

    // Draw the static visual sections of the wheel
    function drawWheel() {
        const radius = canvas.width / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < totalSegments; i++) {
            const angle = i * arc;
            ctx.fillStyle = segments[i].color;
            
            ctx.beginPath();
            ctx.moveTo(radius, radius);
            ctx.arc(radius, radius, radius, angle, angle + arc, false);
            ctx.lineTo(radius, radius);
            ctx.fill();

            // Render Text Inside Segments safely with high contrast styling
            ctx.save();
            
            // Contrast rule: If segment is purple, use white text. Otherwise, use dark ink text.
            ctx.fillStyle = (segments[i].color === '#8c52ff') ? "#ffffff" : "#1a1a1a";
            
            ctx.font = "bold 14px 'Segoe UI', sans-serif";
            ctx.translate(radius, radius);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            
            // Adjusted metrics to keep text from spilling off canvas edge
            ctx.fillText(segments[i].label, radius - 25, 5);
            ctx.restore();
        }
    }

    // Generates unique, high-intent specific discount combinations
    function generateUnpredictableCode(discountVal) {
        const financeWords = ['COMPOUND', 'GROWTH', 'POTENTIAL', 'ASSET', 'PORTFOLIO', 'INTEREST', 'DIVIDEND'];
        const bristolWords = ['BRIS', 'CLIFTON', 'TEMPLE', 'HARBOUR', 'AVON'];
        
        const word1 = bristolWords[Math.floor(Math.random() * bristolWords.length)];
        const word2 = financeWords[Math.floor(Math.random() * financeWords.length)];
        
        // Random 4-digit token to maintain anti-guess uniqueness tracking thresholds
        const cryptoString = Math.random().toString(36).substring(2, 6).toUpperCase();
        
        return `${word1}-${word2}-${discountVal}${cryptoString}`;
    }

    function checkDailyLockout() {
        const lastSpinDate = localStorage.getItem('last_spin_date');
        const todayStr = new Date().toDateString();

        if (lastSpinDate === todayStr) {
            spinBtn.disabled = true;
            spinBtn.style.display = 'none';
            
            const now = new Date();
            const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const hoursLeft = Math.ceil((midnight - now) / (1000 * 60 * 60));
            
            lockoutMsg.style.display = 'block';
            lockoutMsg.innerHTML = `⚠️ You've already used your daily spin! Come back in <strong>${hoursLeft} hours</strong> for your next attempt.`;
            return true;
        }
        return false;
    }

    function spinWheel() {
        if (checkDailyLockout()) return;

        spinBtn.disabled = true;
        resultBox.style.display = 'none';

        // Choose a random segment index
        const targetedSegmentIndex = Math.floor(Math.random() * totalSegments);
        
        // Calculate raw position values relative to standard canvas 0-radian drawing baseline (3 o'clock)
        const degreesPerSegment = 360 / totalSegments;
        const targetAngleDegrees = (targetedSegmentIndex * degreesPerSegment) + (degreesPerSegment / 2);
        
        // To make target sit under 12 o'clock pointer (270° position), adjust math mapping
        const physicalCorrection = 270 - targetAngleDegrees; 
        
        // Add full dramatic momentum turns plus correction target angles
        const finalRotationDegrees = (360 * 5) + physicalCorrection;
        
        canvas.style.transform = `rotate(${finalRotationDegrees}deg)`;

        setTimeout(() => {
            const prize = segments[targetedSegmentIndex];
            
            // Persist checkout lockout instantly
            localStorage.setItem('last_spin_date', new Date().toDateString());

            // Output winning results to layout components
            document.getElementById('rewardAmount').innerText = prize.label;
            document.getElementById('codeDisplay').innerText = generateUnpredictableCode(prize.value);
            resultBox.style.display = 'block';
            
            // Disable button without layout-shifting layout containers instantly
            spinBtn.innerText = "Spun Today";
        }, 4000);
    }

    // Initialize core layouts safely
    drawWheel();
    checkDailyLockout();
</script>

</body>
</html>
